<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="800" height="130">
<defs><style>
  @keyframes f1{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes f2{0%,49%{opacity:0}50%,100%{opacity:1}}
  @keyframes gla{0%,100%{opacity:.3}50%{opacity:1}}
  @keyframes glb{0%,100%{opacity:.25}50%{opacity:.95}}
  @keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes tw{0%,100%{opacity:.05}50%{opacity:.9}}
  @keyframes fall{0%{transform:translateY(-5px);opacity:0}6%{opacity:1}88%{opacity:.75}100%{transform:translateY(120px);opacity:0}}
  @keyframes scan{0%{transform:translateY(0);opacity:.06}100%{transform:translateY(130px);opacity:0}}
  .a1{animation:f1 .4s steps(1,end) infinite}
  .a2{animation:f2 .4s steps(1,end) infinite}
  .ea{animation:gla 1.7s ease-in-out infinite}
  .eb{animation:glb 1.4s ease-in-out infinite .3s}
  .bc{animation:cur 1s steps(1,end) infinite}
  .sc{animation:scan 5s linear infinite}
  .t1{animation:tw 1.8s ease-in-out infinite}
  .t2{animation:tw 2.4s ease-in-out infinite .6s}
  .t3{animation:tw 1.5s ease-in-out infinite 1.2s}
  .t4{animation:tw 2.9s ease-in-out infinite .3s}
  /* code rain — 14 columns, unique speed+delay each */
  .c0{animation:fall 1.5s linear infinite}
  .c1{animation:fall 1.8s linear infinite .3s}
  .c2{animation:fall 1.3s linear infinite .7s}
  .c3{animation:fall 2.0s linear infinite .1s}
  .c4{animation:fall 1.6s linear infinite 1.0s}
  .c5{animation:fall 1.9s linear infinite .5s}
  .c6{animation:fall 1.4s linear infinite 1.3s}
  .c7{animation:fall 2.1s linear infinite .4s}
  .c8{animation:fall 1.7s linear infinite .9s}
  .c9{animation:fall 1.2s linear infinite .2s}
  .ca{animation:fall 2.2s linear infinite 1.1s}
  .cb{animation:fall 1.5s linear infinite .8s}
  .cc{animation:fall 1.8s linear infinite 1.4s}
  .cd{animation:fall 1.3s linear infinite .6s}
  /* trail (dim, offset) */
  .d0{animation:fall 1.5s linear infinite .18s}
  .d1{animation:fall 1.8s linear infinite .48s}
  .d2{animation:fall 1.3s linear infinite .88s}
  .d3{animation:fall 2.0s linear infinite .28s}
  .d4{animation:fall 1.6s linear infinite 1.18s}
  .d5{animation:fall 1.9s linear infinite .68s}
  .d6{animation:fall 1.4s linear infinite 1.48s}
  .d7{animation:fall 2.1s linear infinite .58s}
  .d8{animation:fall 1.7s linear infinite 1.08s}
  .d9{animation:fall 1.2s linear infinite .38s}
  .da{animation:fall 2.2s linear infinite 1.28s}
  .db{animation:fall 1.5s linear infinite .98s}
  .dc{animation:fall 1.8s linear infinite 1.58s}
  .dd{animation:fall 1.3s linear infinite .78s}
</style></defs>

<!-- BG -->
<rect width="800" height="130" fill="#0d1117"/>
<rect width="800" height="2" fill="#4493f8" class="sc"/>

<!-- Stars (center/right only — left is characters) -->
<rect x="330" y="9"  width="2" height="2" fill="#c9d1d9" class="t1"/>
<rect x="395" y="17" width="2" height="2" fill="#c9d1d9" class="t2"/>
<rect x="440" y="6"  width="2" height="2" fill="#c9d1d9" class="t3"/>
<rect x="408" y="26" width="2" height="2" fill="#c9d1d9" class="t4"/>

<!-- Divider -->
<line x1="300" y1="18" x2="300" y2="106" stroke="#21262d" stroke-width="1"/>
<line x1="500" y1="18" x2="500" y2="106" stroke="#21262d" stroke-width="1"/>

<!-- ================================================ -->
<!-- BOT 1: INTEGRIS  (blue, blocky, x=15, scale=5px) -->
<!-- ================================================ -->
<text x="42" y="30" font-family="monospace" font-size="7" fill="#4493f8" text-anchor="middle" letter-spacing="1" opacity=".9">INTEGRIS</text>
<g transform="translate(15,108)">
  <!-- antenna -->
  <rect x="11" y="-73" width="5"  height="9"  fill="#4493f8" opacity=".8"/>
  <rect x="6"  y="-68" width="15" height="4"  fill="#4493f8" opacity=".55"/>
  <!-- head top -->
  <rect x="0"  y="-64" width="30" height="5"  fill="#4493f8"/>
  <!-- head sides + dark interior -->
  <rect x="0"  y="-59" width="5"  height="5"  fill="#4493f8"/>
  <rect x="25" y="-59" width="5"  height="5"  fill="#4493f8"/>
  <rect x="5"  y="-59" width="20" height="5"  fill="#161b22"/>
  <!-- eyes row -->
  <rect x="0"  y="-54" width="5"  height="5"  fill="#4493f8"/>
  <rect x="25" y="-54" width="5"  height="5"  fill="#4493f8"/>
  <rect x="5"  y="-54" width="7"  height="5"  fill="#58d4ff" class="ea"/>
  <rect x="12" y="-54" width="6"  height="5"  fill="#161b22"/>
  <rect x="18" y="-54" width="7"  height="5"  fill="#58d4ff" class="ea"/>
  <!-- jaw -->
  <rect x="0"  y="-49" width="30" height="5"  fill="#4493f8"/>
  <!-- body shoulders -->
  <rect x="0"  y="-44" width="30" height="5"  fill="#4493f8"/>
  <!-- body chest (dark + center indicator) -->
  <rect x="0"  y="-39" width="5"  height="10" fill="#4493f8"/>
  <rect x="25" y="-39" width="5"  height="10" fill="#4493f8"/>
  <rect x="5"  y="-39" width="20" height="10" fill="#161b22"/>
  <rect x="12" y="-37" width="6"  height="6"  fill="#3fb950" class="ea"/>
  <!-- body bottom -->
  <rect x="0"  y="-29" width="30" height="5"  fill="#4493f8"/>
  <!-- waist -->
  <rect x="5"  y="-24" width="20" height="5"  fill="#1158c7"/>
  <!-- legs f1 -->
  <g class="a1">
    <rect x="5"  y="-19" width="6"  height="5"  fill="#1158c7"/>
    <rect x="19" y="-19" width="6"  height="5"  fill="#1158c7"/>
    <rect x="0"  y="-14" width="6"  height="5"  fill="#0d3a8a"/>
    <rect x="19" y="-14" width="11" height="5"  fill="#0d3a8a"/>
  </g>
  <!-- legs f2 -->
  <g class="a2">
    <rect x="5"  y="-19" width="6"  height="5"  fill="#1158c7"/>
    <rect x="19" y="-19" width="6"  height="5"  fill="#1158c7"/>
    <rect x="0"  y="-14" width="11" height="5"  fill="#0d3a8a"/>
    <rect x="24" y="-14" width="6"  height="5"  fill="#0d3a8a"/>
  </g>
</g>

<!-- ================================================ -->
<!-- BOT 2: JULES  (amber, sleek, x=155, scale=5px)  -->
<!-- ================================================ -->
<text x="182" y="30" font-family="monospace" font-size="7" fill="#e6a800" text-anchor="middle" letter-spacing="1" opacity=".9">JULES</text>
<g transform="translate(155,108)">
  <!-- antenna (slim) -->
  <rect x="11" y="-71" width="5"  height="7"  fill="#e6a800" opacity=".8"/>
  <!-- head: rounder feel — wider mid -->
  <rect x="5"  y="-64" width="20" height="5"  fill="#e6a800"/>
  <rect x="0"  y="-59" width="30" height="5"  fill="#e6a800"/>
  <!-- eyes -->
  <rect x="0"  y="-54" width="5"  height="5"  fill="#e6a800"/>
  <rect x="25" y="-54" width="5"  height="5"  fill="#e6a800"/>
  <rect x="5"  y="-54" width="7"  height="5"  fill="#ffcc00" class="eb"/>
  <rect x="12" y="-54" width="6"  height="5"  fill="#161b22"/>
  <rect x="18" y="-54" width="7"  height="5"  fill="#ffcc00" class="eb"/>
  <!-- chin -->
  <rect x="5"  y="-49" width="20" height="5"  fill="#e6a800"/>
  <!-- body -->
  <rect x="0"  y="-44" width="30" height="5"  fill="#c8870a"/>
  <!-- chest dark with > symbol -->
  <rect x="0"  y="-39" width="5"  height="10" fill="#c8870a"/>
  <rect x="25" y="-39" width="5"  height="10" fill="#c8870a"/>
  <rect x="5"  y="-39" width="20" height="10" fill="#161b22"/>
  <!-- '>' shape in chest -->
  <rect x="9"  y="-37" width="4"  height="2"  fill="#e6a800"/>
  <rect x="13" y="-35" width="4"  height="2"  fill="#e6a800"/>
  <rect x="9"  y="-33" width="4"  height="2"  fill="#e6a800"/>
  <rect x="0"  y="-29" width="30" height="5"  fill="#c8870a"/>
  <!-- waist -->
  <rect x="5"  y="-24" width="20" height="5"  fill="#a06a08"/>
  <!-- legs f1 (opposite phase to INTEGRIS) -->
  <g class="a2">
    <rect x="5"  y="-19" width="6"  height="5"  fill="#a06a08"/>
    <rect x="19" y="-19" width="6"  height="5"  fill="#a06a08"/>
    <rect x="0"  y="-14" width="6"  height="5"  fill="#7a4f06"/>
    <rect x="19" y="-14" width="11" height="5"  fill="#7a4f06"/>
  </g>
  <!-- legs f2 -->
  <g class="a1">
    <rect x="5"  y="-19" width="6"  height="5"  fill="#a06a08"/>
    <rect x="19" y="-19" width="6"  height="5"  fill="#a06a08"/>
    <rect x="0"  y="-14" width="11" height="5"  fill="#7a4f06"/>
    <rect x="24" y="-14" width="6"  height="5"  fill="#7a4f06"/>
  </g>
</g>

<!-- ================================================ -->
<!-- CENTER: Title + subtitle                         -->
<!-- ================================================ -->
<text x="400" y="65" font-family="'Courier New',monospace" font-size="28" font-weight="bold"
      fill="#e6edf3" text-anchor="middle" letter-spacing="7">TIRUNARA</text>
<text x="400" y="83" font-family="monospace" font-size="10" fill="#8b949e"
      text-anchor="middle" letter-spacing="2">builder · systems · ai</text>

<!-- ================================================ -->
<!-- RIGHT: Matrix code rain (14 columns, x=510-790)  -->
<!-- ================================================ -->
<!-- lead chars (bright green) -->
<text x="510" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c0">1</text>
<text x="530" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c1">0</text>
<text x="550" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c2">&gt;</text>
<text x="570" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c3">λ</text>
<text x="590" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c4">{</text>
<text x="610" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c5">1</text>
<text x="630" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c6">/</text>
<text x="650" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c7">0</text>
<text x="670" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c8">}</text>
<text x="690" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="c9">#</text>
<text x="710" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="ca">1</text>
<text x="730" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="cb">&lt;</text>
<text x="755" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="cc">*</text>
<text x="778" y="0" font-family="monospace" font-size="11" fill="#3fb950" class="cd">0</text>
<!-- trail chars (dimmer) -->
<text x="510" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d0">0</text>
<text x="530" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d1">1</text>
<text x="550" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d2">&lt;</text>
<text x="570" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d3">/</text>
<text x="590" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d4">}</text>
<text x="610" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d5">0</text>
<text x="630" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d6">λ</text>
<text x="650" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d7">1</text>
<text x="670" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d8">{</text>
<text x="690" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="d9">0</text>
<text x="710" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="da">&gt;</text>
<text x="730" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="db">1</text>
<text x="755" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="dc">#</text>
<text x="778" y="0" font-family="monospace" font-size="11" fill="#3fb950" opacity=".35" class="dd">λ</text>

<!-- Ground -->
<line x1="0" y1="108" x2="800" y2="108" stroke="#21262d" stroke-width="1.5"/>
<!-- Bottom bar -->
<rect x="0" y="114" width="800" height="16" fill="#161b22"/>
<text x="8"   y="125" font-family="monospace" font-size="8" fill="#4493f8">INTEGRIS</text>
<text x="72"  y="125" font-family="monospace" font-size="8" fill="#8b949e"> + </text>
<text x="88"  y="125" font-family="monospace" font-size="8" fill="#e6a800">JULES</text>
<text x="130" y="125" font-family="monospace" font-size="8" fill="#8b949e"> › powered by integrity</text>
<rect x="310" y="116" width="6" height="10" fill="#3fb950" class="bc"/>
</svg>