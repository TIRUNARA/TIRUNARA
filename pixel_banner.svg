<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="800" height="130">
<defs>
  <style>
    @keyframes march { from { transform: translateX(-60px); } to { transform: translateX(860px); } }
    @keyframes f1 { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes f2 { 0%,49%{opacity:0} 50%,100%{opacity:1} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes pulse { 0%,100%{opacity:0.25} 50%{opacity:0.9} }
    @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes scanline { 0%{transform:translateY(-10px);opacity:0.07} 100%{transform:translateY(140px);opacity:0} }
    @keyframes twinkle { 0%,100%{opacity:0.1} 50%{opacity:0.9} }
    .char { animation: march 6s linear infinite; }
    .legs1 { animation: f1 0.35s steps(1,end) infinite; }
    .legs2 { animation: f2 0.35s steps(1,end) infinite; }
    .cur { animation: blink 1s steps(1,end) infinite; }
    .nd1 { animation: pulse 2.4s ease-in-out infinite; }
    .nd2 { animation: pulse 2.4s ease-in-out infinite 0.8s; }
    .nd3 { animation: pulse 2.4s ease-in-out infinite 1.6s; }
    .sc { animation: scanline 4s linear infinite; }
    .tw1 { animation: twinkle 1.8s ease-in-out infinite; }
    .tw2 { animation: twinkle 2.3s ease-in-out infinite 0.4s; }
    .tw3 { animation: twinkle 1.5s ease-in-out infinite 1.1s; }
    .tw4 { animation: twinkle 2.7s ease-in-out infinite 0.7s; }
    .tw5 { animation: twinkle 1.9s ease-in-out infinite 1.5s; }
    .tw6 { animation: twinkle 2.1s ease-in-out infinite 0.2s; }
  </style>
</defs>
