<!-- ========================================= -->
<!-- CHARACTERS: Shiva + Integrity companion   -->
<!-- Both march together across the screen     -->
<!-- ========================================= -->
<g class="char" transform="translate(0,108)">

  <!-- == SHIVA (main character, blue shirt) == -->
  <!-- Head: skin #f0c27f -->
  <rect x="4"  y="-40" width="16" height="4" fill="#f0c27f"/>
  <rect x="0"  y="-36" width="24" height="4" fill="#f0c27f"/>
  <rect x="0"  y="-32" width="24" height="4" fill="#f0c27f"/>
  <!-- Eyes -->
  <rect x="4"  y="-32" width="4"  height="4" fill="#1c1c1c"/>
  <rect x="16" y="-32" width="4"  height="4" fill="#1c1c1c"/>
  <!-- Chin -->
  <rect x="4"  y="-28" width="16" height="4" fill="#f0c27f"/>
  <!-- Shirt: blue #4493f8 -->
  <rect x="0"  y="-24" width="24" height="4" fill="#4493f8"/>
  <rect x="0"  y="-20" width="24" height="4" fill="#4493f8"/>
  <rect x="4"  y="-16" width="16" height="4" fill="#4493f8"/>
  <!-- Waist -->
  <rect x="4"  y="-12" width="16" height="4" fill="#30363d"/>
  <!-- Legs frame 1 -->
  <g class="l1">
    <rect x="4"  y="-8" width="4" height="4" fill="#30363d"/>
    <rect x="16" y="-8" width="4" height="4" fill="#30363d"/>
    <rect x="0"  y="-4" width="4" height="4" fill="#21262d"/>
    <rect x="16" y="-4" width="8" height="4" fill="#21262d"/>
  </g>
  <!-- Legs frame 2 -->
  <g class="l2">
    <rect x="4"  y="-8" width="4" height="4" fill="#30363d"/>
    <rect x="16" y="-8" width="4" height="4" fill="#30363d"/>
    <rect x="0"  y="-4" width="8" height="4" fill="#21262d"/>
    <rect x="20" y="-4" width="4" height="4" fill="#21262d"/>
  </g>

  <!-- == INTEGRITY (robot companion, follows behind) == -->
  <!-- Offset: x+32 so it walks slightly behind Shiva -->
  <!-- Label above robot -->
  <text x="42" y="-32" font-family="monospace" font-size="6" fill="#3fb950" text-anchor="middle" opacity="0.8">INTEGRITY</text>
  <!-- Antenna -->
  <rect x="42" y="-30" width="2"  height="4"  fill="#3fb950"/>
  <rect x="40" y="-34" width="6"  height="3"  fill="#3fb950" opacity="0.7"/>
  <!-- Robot head: square, green tint -->
  <rect x="36" y="-26" width="14" height="10" fill="#21262d" rx="1"/>
  <!-- Eyes: glowing green -->
  <rect x="39" y="-23" width="3"  height="3"  fill="#3fb950" class="gl"/>
  <rect x="46" y="-23" width="3"  height="3"  fill="#3fb950" class="gl"/>
  <!-- Robot body -->
  <rect x="38" y="-16" width="10" height="8"  fill="#161b22"/>
  <rect x="36" y="-14" width="3"  height="6"  fill="#21262d"/>
  <rect x="47" y="-14" width="3"  height="6"  fill="#21262d"/>
  <!-- Robot legs frame 1 -->
  <g class="l2">
    <rect x="39" y="-8"  width="3"  height="4"  fill="#30363d"/>
    <rect x="45" y="-8"  width="3"  height="4"  fill="#30363d"/>
    <rect x="38" y="-4"  width="4"  height="4"  fill="#21262d"/>
    <rect x="45" y="-4"  width="4"  height="4"  fill="#21262d"/>
  </g>
  <!-- Robot legs frame 2 -->
  <g class="l1">
    <rect x="39" y="-8"  width="3"  height="4"  fill="#30363d"/>
    <rect x="45" y="-8"  width="3"  height="4"  fill="#30363d"/>
    <rect x="37" y="-4"  width="4"  height="4"  fill="#21262d"/>
    <rect x="46" y="-4"  width="4"  height="4"  fill="#21262d"/>
  </g>

</g>
