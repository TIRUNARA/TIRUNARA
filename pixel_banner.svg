<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="800" height="130">
<defs>
  <clipPath id="gc"><rect width="800" height="130"/></clipPath>
  <style>
    @keyframes f1{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes f2{0%,49%{opacity:0}50%,100%{opacity:1}}
    @keyframes gla{0%,100%{opacity:.3}50%{opacity:1}}
    @keyframes glb{0%,100%{opacity:.25}50%{opacity:.95}}
    @keyframes glc{0%,100%{opacity:.2}50%{opacity:1}}
    @keyframes bc{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes tw{0%,100%{opacity:.05}50%{opacity:.9}}
    @keyframes sc{0%{transform:translateY(0);opacity:.05}100%{transform:translateY(130px);opacity:0}}
    @keyframes gr{from{transform:translateX(0)}to{transform:translateX(-16px)}}
    .l1{animation:f1 .38s steps(1,end) infinite}
    .l2{animation:f2 .38s steps(1,end) infinite}
    .ea{animation:gla 1.6s ease-in-out infinite}
    .eb{animation:glb 1.5s ease-in-out infinite .3s}
    .ec{animation:glc 1.7s ease-in-out infinite .1s}
    .sc{animation:sc 5s linear infinite}
    .bc{animation:bc 1s steps(1,end) infinite}
    .gr{animation:gr .55s linear infinite}
    .t1{animation:tw 1.9s ease-in-out infinite}
    .t2{animation:tw 2.5s ease-in-out infinite .5s}
    .t3{animation:tw 1.6s ease-in-out infinite 1.1s}
    .t4{animation:tw 3.0s ease-in-out infinite .8s}
  </style>
</defs>

<rect width="800" height="130" fill="#0d1117"/>
<rect width="800" height="2" fill="#4493f8" opacity=".06" class="sc"/>

<!-- Dividers -->
<line x1="270" y1="18" x2="270" y2="106" stroke="#21262d" stroke-width="1"/>
<line x1="530" y1="18" x2="530" y2="106" stroke="#21262d" stroke-width="1"/>

<!-- Stars (Center) -->
<rect x="300" y="8"  width="2" height="2" fill="#c9d1d9" class="t1"/>
<rect x="370" y="16" width="2" height="2" fill="#c9d1d9" class="t2"/>
<rect x="420" y="6"  width="2" height="2" fill="#c9d1d9" class="t3"/>
<rect x="480" y="20" width="2" height="2" fill="#c9d1d9" class="t4"/>
<rect x="340" y="24" width="2" height="2" fill="#c9d1d9" class="t2"/>
<rect x="450" y="12" width="2" height="2" fill="#c9d1d9" class="t1"/>

<!-- ===================== LEFT: BOT 1 — INTEGRIS (Blue companion style) ===================== -->
<text x="62" y="27" font-family="monospace" font-size="7" fill="#4493f8" text-anchor="middle" letter-spacing="1">INTEGRIS</text>
<g transform="translate(40,108)">
  <!-- Antenna -->
  <rect x="21" y="-57" width="4"  height="6"  fill="#4493f8"/>
  <rect x="17" y="-62" width="12" height="5"  fill="#4493f8" opacity="0.6"/>
  <!-- Head -->
  <rect x="10" y="-51" width="35" height="5"  fill="#21262d"/>
  <rect x="10" y="-46" width="35" height="5"  fill="#21262d"/>
  <!-- glowing blue eyes -->
  <rect x="14" y="-46" width="8"  height="5"  fill="#58d4ff" class="ea"/>
  <rect x="33" y="-46" width="8"  height="5"  fill="#58d4ff" class="ea"/>
  <rect x="10" y="-41" width="35" height="5"  fill="#21262d"/>
  <!-- Body -->
  <rect x="12" y="-36" width="31" height="5"  fill="#161b22"/>
  <rect x="10" y="-34" width="5"  height="9"  fill="#21262d"/>
  <rect x="40" y="-34" width="5"  height="9"  fill="#21262d"/>
  <rect x="12" y="-31" width="31" height="5"  fill="#161b22"/>
  <!-- Chest indicator (blue glow) -->
  <rect x="24" y="-33" width="6"  height="4"  fill="#58d4ff" class="ea"/>
  <!-- Waist -->
  <rect x="14" y="-21" width="27" height="4"  fill="#1158c7"/>
  <!-- Legs frame 1 -->
  <g class="l2">
    <rect x="14" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="33" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="10" y="-12" width="8"  height="5"  fill="#21262d"/>
    <rect x="33" y="-12" width="12" height="5"  fill="#21262d"/>
  </g>
  <!-- Legs frame 2 -->
  <g class="l1">
    <rect x="14" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="33" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="10" y="-12" width="12" height="5"  fill="#21262d"/>
    <rect x="37" y="-12" width="8"  height="5"  fill="#21262d"/>
  </g>
</g>

<!-- ===================== LEFT: BOT 2 — JULES (Amber companion style) ===================== -->
<text x="187" y="27" font-family="monospace" font-size="7" fill="#e6a800" text-anchor="middle" letter-spacing="1">JULES</text>
<g transform="translate(165,108)">
  <!-- Antenna -->
  <rect x="21" y="-57" width="4"  height="6"  fill="#e6a800"/>
  <rect x="17" y="-62" width="12" height="5"  fill="#e6a800" opacity="0.6"/>
  <!-- Head -->
  <rect x="10" y="-51" width="35" height="5"  fill="#21262d"/>
  <rect x="10" y="-46" width="35" height="5"  fill="#21262d"/>
  <!-- glowing amber eyes -->
  <rect x="14" y="-46" width="8"  height="5"  fill="#ffcc00" class="eb"/>
  <rect x="33" y="-46" width="8"  height="5"  fill="#ffcc00" class="eb"/>
  <rect x="10" y="-41" width="35" height="5"  fill="#21262d"/>
  <!-- Body -->
  <rect x="12" y="-36" width="31" height="5"  fill="#161b22"/>
  <rect x="10" y="-34" width="5"  height="9"  fill="#21262d"/>
  <rect x="40" y="-34" width="5"  height="9"  fill="#21262d"/>
  <rect x="12" y="-31" width="31" height="5"  fill="#161b22"/>
  <!-- Chest indicator (amber glow) -->
  <rect x="24" y="-33" width="6"  height="4"  fill="#ffcc00" class="eb"/>
  <!-- Waist -->
  <rect x="14" y="-21" width="27" height="4"  fill="#a06a08"/>
  <!-- Legs frame 1 (alternate phase to Integris) -->
  <g class="l1">
    <rect x="14" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="33" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="10" y="-12" width="8"  height="5"  fill="#21262d"/>
    <rect x="33" y="-12" width="12" height="5"  fill="#21262d"/>
  </g>
  <!-- Legs frame 2 -->
  <g class="l2">
    <rect x="14" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="33" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="10" y="-12" width="12" height="5"  fill="#21262d"/>
    <rect x="37" y="-12" width="8"  height="5"  fill="#21262d"/>
  </g>
</g>

<!-- ==================== CENTER: Title ======================== -->
<text x="400" y="63" font-family="'Courier New',monospace" font-size="26" font-weight="bold"
      fill="#e6edf3" text-anchor="middle" letter-spacing="7">TIRUNARA</text>
<text x="400" y="82" font-family="monospace" font-size="9" fill="#8b949e"
      text-anchor="middle" letter-spacing="1.5">integris · jules · integrity</text>

