<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="800" height="130">
<defs>
  <style>
    @keyframes march    { from{transform:translateX(-80px)} to{transform:translateX(880px)} }
    @keyframes f1       { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes f2       { 0%,49%{opacity:0} 50%,100%{opacity:1} }
    @keyframes blink    { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes twinkle  { 0%,100%{opacity:0.08} 50%{opacity:1} }
    @keyframes floatup  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes floatup2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes scanline { 0%{transform:translateY(-4px);opacity:0.06} 100%{transform:translateY(134px);opacity:0} }
    @keyframes glow     { 0%,100%{opacity:0.35} 50%{opacity:0.9} }
    .char  { animation: march 7s linear infinite; }
    .l1    { animation: f1 0.34s steps(1,end) infinite; }
    .l2    { animation: f2 0.34s steps(1,end) infinite; }
    .cur   { animation: blink 1s steps(1,end) infinite; }
    .sc    { animation: scanline 5s linear infinite; }
    .sym1  { animation: floatup  3.2s ease-in-out infinite; }
    .sym2  { animation: floatup  4.1s ease-in-out infinite 0.7s; }
    .sym3  { animation: floatup2 2.8s ease-in-out infinite 1.4s; }
    .sym4  { animation: floatup  3.6s ease-in-out infinite 0.3s; }
    .sym5  { animation: floatup2 4.4s ease-in-out infinite 1.9s; }
    .sym6  { animation: floatup  3.0s ease-in-out infinite 2.2s; }
    .gl    { animation: glow 2.8s ease-in-out infinite; }
    .tw1   { animation: twinkle 1.8s ease-in-out infinite; }
    .tw2   { animation: twinkle 2.5s ease-in-out infinite 0.6s; }
    .tw3   { animation: twinkle 1.4s ease-in-out infinite 1.2s; }
    .tw4   { animation: twinkle 3.1s ease-in-out infinite 0.9s; }
    .tw5   { animation: twinkle 2.0s ease-in-out infinite 1.7s; }
    .tw6   { animation: twinkle 1.6s ease-in-out infinite 0.4s; }
    .tw7   { animation: twinkle 2.9s ease-in-out infinite 2.1s; }
    .tw8   { animation: twinkle 1.3s ease-in-out infinite 0.1s; }
  </style>
</defs>

<!-- Background -->
<rect width="800" height="130" fill="#0d1117"/>

<!-- Scanline sweep -->
<rect width="800" height="3" fill="#58a6ff" class="sc"/>

<!-- Stars -->
<rect x="22"  y="8"  width="2" height="2" fill="#e6edf3" class="tw1"/>
<rect x="80"  y="18" width="2" height="2" fill="#e6edf3" class="tw2"/>
<rect x="145" y="6"  width="2" height="2" fill="#e6edf3" class="tw3"/>
<rect x="210" y="20" width="2" height="2" fill="#e6edf3" class="tw4"/>
<rect x="310" y="11" width="2" height="2" fill="#e6edf3" class="tw5"/>
<rect x="450" y="7"  width="2" height="2" fill="#e6edf3" class="tw6"/>
<rect x="560" y="19" width="2" height="2" fill="#e6edf3" class="tw7"/>
<rect x="670" y="9"  width="2" height="2" fill="#e6edf3" class="tw8"/>
<rect x="740" y="15" width="2" height="2" fill="#e6edf3" class="tw1"/>
<rect x="500" y="23" width="2" height="2" fill="#e6edf3" class="tw3"/>
<rect x="380" y="5"  width="2" height="2" fill="#e6edf3" class="tw5"/>
<rect x="610" y="13" width="2" height="2" fill="#e6edf3" class="tw2"/>

<!-- Floating code symbols (generic, timeless) -->
<text x="55"  y="45" font-family="monospace" font-size="13" fill="#58a6ff" opacity="0.5" class="sym1">&lt;/&gt;</text>
<text x="155" y="38" font-family="monospace" font-size="12" fill="#3fb950" opacity="0.5" class="sym2">{ }</text>
<text x="255" y="50" font-family="monospace" font-size="11" fill="#e6a800" opacity="0.45" class="sym3">λ</text>
<text x="530" y="40" font-family="monospace" font-size="12" fill="#58a6ff" opacity="0.45" class="sym4">//</text>
<text x="640" y="48" font-family="monospace" font-size="11" fill="#3fb950" opacity="0.5" class="sym5">01</text>
<text x="720" y="36" font-family="monospace" font-size="12" fill="#bc8cff" opacity="0.45" class="sym6">::</text>

<!-- Center title -->
<text x="400" y="60"
      font-family="'Courier New',Courier,monospace"
      font-size="32" font-weight="bold"
      fill="#e6edf3" text-anchor="middle" letter-spacing="10">TIRUNARA</text>

<!-- Subtitle -->
<text x="400" y="82"
      font-family="monospace" font-size="11"
      fill="#8b949e" text-anchor="middle"
      letter-spacing="2">builder · systems · ai</text>

