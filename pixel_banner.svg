<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="800" height="130">
<defs>
  <style>
    @keyframes f1    { 0%,49%{opacity:1}  50%,100%{opacity:0} }
    @keyframes f2    { 0%,49%{opacity:0}  50%,100%{opacity:1} }
    @keyframes blink { 0%,49%{opacity:1}  50%,100%{opacity:0} }
    @keyframes glow  { 0%,100%{opacity:0.3} 50%{opacity:1} }
    @keyframes twink { 0%,100%{opacity:0.06} 50%{opacity:0.95} }
    @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes scan  { 0%{transform:translateY(0);opacity:0.05} 100%{transform:translateY(130px);opacity:0} }
    @keyframes ground{ from{transform:translateX(0)} to{transform:translateX(-16px)} }
    .l1  { animation: f1    0.38s steps(1,end) infinite; }
    .l2  { animation: f2    0.38s steps(1,end) infinite; }
    .gl  { animation: glow  1.6s  ease-in-out infinite; }
    .cur { animation: blink 1s    steps(1,end) infinite; }
    .sc  { animation: scan  5s    linear infinite; }
    .s1  { animation: drift 3.1s  ease-in-out infinite; }
    .s2  { animation: drift 4.0s  ease-in-out infinite 0.6s; }
    .s3  { animation: drift 2.7s  ease-in-out infinite 1.3s; }
    .s4  { animation: drift 3.5s  ease-in-out infinite 0.2s; }
    .s5  { animation: drift 4.2s  ease-in-out infinite 1.8s; }
    .tw1 { animation: twink 1.7s  ease-in-out infinite; }
    .tw2 { animation: twink 2.4s  ease-in-out infinite 0.5s; }
    .tw3 { animation: twink 1.3s  ease-in-out infinite 1.1s; }
    .tw4 { animation: twink 3.0s  ease-in-out infinite 0.8s; }
    .tw5 { animation: twink 1.9s  ease-in-out infinite 1.6s; }
    .tw6 { animation: twink 2.2s  ease-in-out infinite 0.3s; }
    .gr  { animation: ground 0.5s linear infinite; }
  </style>
</defs>

<!-- BG -->
<rect width="800" height="130" fill="#0d1117"/>
<!-- Scan line -->
<rect width="800" height="3" fill="#4493f8" opacity="0.06" class="sc"/>

<!-- Stars -->
<rect x="290" y="8"  width="2" height="2" fill="#c9d1d9" class="tw1"/>
<rect x="360" y="15" width="2" height="2" fill="#c9d1d9" class="tw2"/>
<rect x="430" y="6"  width="2" height="2" fill="#c9d1d9" class="tw3"/>
<rect x="510" y="20" width="2" height="2" fill="#c9d1d9" class="tw4"/>
<rect x="590" y="10" width="2" height="2" fill="#c9d1d9" class="tw5"/>
<rect x="660" y="17" width="2" height="2" fill="#c9d1d9" class="tw6"/>
<rect x="730" y="7"  width="2" height="2" fill="#c9d1d9" class="tw1"/>
<rect x="760" y="22" width="2" height="2" fill="#c9d1d9" class="tw3"/>
<rect x="330" y="25" width="2" height="2" fill="#c9d1d9" class="tw5"/>
<rect x="480" y="13" width="2" height="2" fill="#c9d1d9" class="tw2"/>

<!-- Divider line between characters and title -->
<line x1="260" y1="25" x2="260" y2="105" stroke="#21262d" stroke-width="1"/>

<!-- ====================================================== -->
<!--  SHIVA: fixed at x=30, y=108. Scale 6px per pixel.    -->
<!--  Character: 5 cols x 10 rows = 30px x 60px            -->
<!-- ====================================================== -->
<g transform="translate(30,108)">
  <!-- HEAD (skin: #ffb347, bright so visible on dark BG) -->
  <!-- row 0: cols 1-3 (skip 0,4) -->
  <rect x="6"  y="-60" width="18" height="6" fill="#ffb347"/>
  <!-- row 1: full 0-4 -->
  <rect x="0"  y="-54" width="30" height="6" fill="#ffb347"/>
  <!-- row 2: full, with eyes punched out -->
  <rect x="0"  y="-48" width="30" height="6" fill="#ffb347"/>
  <rect x="3"  y="-48" width="6"  height="6" fill="#161b22"/>
  <rect x="21" y="-48" width="6"  height="6" fill="#161b22"/>
  <!-- row 3: cols 1-3 chin -->
  <rect x="6"  y="-42" width="18" height="6" fill="#ffb347"/>

  <!-- SHIRT (bright blue #4493f8) -->
  <!-- row 4: full (arms) -->
  <rect x="0"  y="-36" width="30" height="6" fill="#4493f8"/>
  <!-- row 5: full torso -->
  <rect x="0"  y="-30" width="30" height="6" fill="#4493f8"/>
  <!-- row 6: cols 1-3 lower torso -->
  <rect x="6"  y="-24" width="18" height="6" fill="#4493f8"/>

  <!-- WAIST (#484f58) -->
  <rect x="6"  y="-18" width="18" height="6" fill="#484f58"/>

  <!-- LEGS - frame 1 (left foot forward) -->
  <g class="l1">
    <!-- upper legs -->
    <rect x="6"  y="-12" width="6"  height="6" fill="#484f58"/>
    <rect x="18" y="-12" width="6"  height="6" fill="#484f58"/>
    <!-- feet: left fwd, right back -->
    <rect x="0"  y="-6"  width="6"  height="6" fill="#30363d"/>
    <rect x="18" y="-6"  width="12" height="6" fill="#30363d"/>
  </g>
  <!-- LEGS - frame 2 (right foot forward) -->
  <g class="l2">
    <rect x="6"  y="-12" width="6"  height="6" fill="#484f58"/>
    <rect x="18" y="-12" width="6"  height="6" fill="#484f58"/>
    <rect x="0"  y="-6"  width="12" height="6" fill="#30363d"/>
    <rect x="24" y="-6"  width="6"  height="6" fill="#30363d"/>
  </g>
</g>

<!-- ====================================================== -->
<!--  INTEGRITY ROBOT: fixed at x=130, y=108.              -->
<!--  Scale 5px per pixel. Smaller companion.              -->
<!-- ====================================================== -->
<!-- Label -->
<text x="153" y="43" font-family="monospace" font-size="7" fill="#3fb950" text-anchor="middle" opacity="0.85">INTEGRITY</text>
<g transform="translate(130,108)">
  <!-- Antenna -->
  <rect x="21" y="-57" width="4"  height="6"  fill="#3fb950"/>
  <rect x="17" y="-62" width="12" height="5"  fill="#3fb950" opacity="0.7"/>

  <!-- ROBOT HEAD (square, dark with bright eyes) -->
  <rect x="10" y="-51" width="35" height="5"  fill="#21262d"/>
  <rect x="10" y="-46" width="35" height="5"  fill="#21262d"/>
  <!-- glowing eyes -->
  <rect x="14" y="-46" width="8"  height="5"  fill="#3fb950" class="gl"/>
  <rect x="33" y="-46" width="8"  height="5"  fill="#3fb950" class="gl"/>
  <rect x="10" y="-41" width="35" height="5"  fill="#21262d"/>

  <!-- ROBOT BODY -->
  <rect x="12" y="-36" width="31" height="5"  fill="#161b22"/>
  <rect x="10" y="-34" width="5"  height="9"  fill="#21262d"/>
  <rect x="40" y="-34" width="5"  height="9"  fill="#21262d"/>
  <rect x="12" y="-31" width="31" height="5"  fill="#161b22"/>

  <!-- ROBOT WAIST -->
  <rect x="14" y="-21" width="27" height="4"  fill="#21262d"/>

  <!-- ROBOT LEGS frame 1 -->
  <g class="l2">
    <rect x="14" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="33" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="10" y="-12" width="8"  height="5"  fill="#21262d"/>
    <rect x="33" y="-12" width="12" height="5"  fill="#21262d"/>
  </g>
  <!-- ROBOT LEGS frame 2 -->
  <g class="l1">
    <rect x="14" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="33" y="-17" width="8"  height="5"  fill="#30363d"/>
    <rect x="10" y="-12" width="12" height="5"  fill="#21262d"/>
    <rect x="37" y="-12" width="8"  height="5"  fill="#21262d"/>
  </g>
</g>
<!-- ======== END CHARACTERS ======== -->

<!-- Floating code symbols (right side) -->
<text x="330" y="48" font-family="monospace" font-size="14" fill="#4493f8" opacity="0.55" class="s1">&lt;/&gt;</text>
<text x="420" y="38" font-family="monospace" font-size="13" fill="#3fb950" opacity="0.55" class="s2">{ }</text>
<text x="510" y="52" font-family="monospace" font-size="15" fill="#e6a800" opacity="0.5"  class="s3">λ</text>
<text x="590" y="40" font-family="monospace" font-size="13" fill="#4493f8" opacity="0.5"  class="s4">//</text>
<text x="660" y="50" font-family="monospace" font-size="12" fill="#bc8cff" opacity="0.55" class="s5">::</text>
<text x="730" y="42" font-family="monospace" font-size="13" fill="#3fb950" opacity="0.45" class="s1">01</text>

<!-- Title -->
<text x="530" y="75"
      font-family="'Courier New',Courier,monospace"
      font-size="30" font-weight="bold"
      fill="#e6edf3" text-anchor="middle" letter-spacing="8">TIRUNARA</text>

<!-- Subtitle -->
<text x="530" y="95"
      font-family="monospace" font-size="10"
      fill="#8b949e" text-anchor="middle" letter-spacing="2">builder · systems · ai</text>

<!-- Ground -->
<line x1="0" y1="108" x2="800" y2="108" stroke="#21262d" stroke-width="1"/>

<!-- Scrolling ground tiles under character area (creates walking illusion) -->
<g class="gr">
  <rect x="0"   y="109" width="4" height="3" fill="#30363d"/>
  <rect x="8"   y="109" width="4" height="3" fill="#30363d"/>
  <rect x="16"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="24"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="32"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="40"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="48"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="56"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="64"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="72"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="80"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="88"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="96"  y="109" width="4" height="3" fill="#30363d"/>
  <rect x="104" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="112" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="120" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="128" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="136" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="144" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="152" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="160" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="168" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="176" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="184" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="192" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="200" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="208" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="216" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="224" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="232" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="240" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="248" y="109" width="4" height="3" fill="#30363d"/>
  <rect x="256" y="109" width="4" height="3" fill="#30363d"/>
</g>
<!-- Static ground (right half) -->
<rect x="260" y="109" width="540" height="3" fill="#161b22"/>

<!-- Bottom bar -->
<rect x="0" y="118" width="800" height="12" fill="#161b22"/>
<text x="8" y="128" font-family="monospace" font-size="9" fill="#8b949e">tirunara@github</text>
<text x="104" y="128" font-family="monospace" font-size="9" fill="#3fb950"> ▶</text>
<rect x="118" y="119" width="6" height="9" fill="#3fb950" class="cur"/>
</svg>